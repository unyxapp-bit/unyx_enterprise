name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unyx-enterprise
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: unyx-enterprise/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: https://tctyxfedbbuycyvhafwk.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_BEBoq_BrXbmRRvDx2gmuqw_8npUhLub
          VITE_SUPABASE_PROJECT_ID: tctyxfedbbuycyvhafwk

      - name: Add SPA fallbacks
        run: npm run pages:prepare

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: unyx-enterprise/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
